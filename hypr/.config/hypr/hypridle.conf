general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Plugged in

# Lock
listener {
    timeout = 60
    on-timeout = sh -c '(! ls /sys/class/power_supply/BAT* >/dev/null 2>&1 || [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 1 ]) && loginctl lock-session'
}

# Dim screen
listener {
    timeout = 120
    on-timeout = sh -c '(! ls /sys/class/power_supply/BAT* >/dev/null 2>&1 || [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 1 ]) && brightnessctl -s && brightnessctl set 0%'
    on-resume = brightnessctl -r
}

# Suspend
listener {
    timeout = 600
    on-timeout = sh -c '(! ls /sys/class/power_supply/BAT* >/dev/null 2>&1 || [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 1 ]) && systemctl suspend'
}

# Battery

# Dim screen
listener {
    timeout = 30
    on-timeout = sh -c '(ls /sys/class/power_supply/BAT* >/dev/null 2>&1 && [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 0 ]) && brightnessctl -s && brightnessctl set 0%'
    on-resume = brightnessctl -r
}

# Lock
listener {
    timeout = 60
    on-timeout = sh -c '(ls /sys/class/power_supply/BAT* >/dev/null 2>&1 && [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 0 ]) && loginctl lock-session'
}

# Suspend
listener {
    timeout = 120
    on-timeout = sh -c '(ls /sys/class/power_supply/BAT* >/dev/null 2>&1 && [ "$(cat /sys/class/power_supply/*/online 2>/dev/null | head -n1)" = 0 ]) && systemctl suspend'
}

